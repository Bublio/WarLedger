<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>War Ledger | Strategic Command</title>
    <style>
        :root {
            --bg-dark: #0f0f12; --sidebar-bg: #16161d; --card-bg: #1c1c24;
            --accent-gold: #d4a017; --text-main: #ffffff; 
            --text-dim: #94a3b8; 
            --bar-owned: #d4a017; --bar-built: #3498db; --bar-primed: #9b59b6; --bar-painted: #2ecc71;
            
            --color-hero: #ff9f43; --color-character: #fb6340; --color-battleline: #2dce89; 
            --color-fire_support: #3498db; --color-close_support: #f1c40f; --color-vehicle: #8965e0;
            --border-color: #2d2d3a;
        }

        body.light-mode {
            --bg-dark: #f8f9fa; --sidebar-bg: #ffffff; --card-bg: #ffffff;
            --text-main: #1e293b; --text-dim: #64748b; --border-color: #e2e8f0;
        }

        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg-dark); color: var(--text-main); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar Styles */
        .sidebar { width: 260px; background: var(--sidebar-bg); border-right: 1px solid var(--border-color); padding: 24px; flex-shrink: 0; display: flex; flex-direction: column; }
        .logo { color: var(--accent-gold); font-weight: 900; margin-bottom: 32px; font-size: 1.2rem; letter-spacing: 1px; display: flex; align-items: center; gap: 10px; }
        .nav-item { padding: 12px 16px; color: var(--text-dim); border-radius: 10px; margin-bottom: 4px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 12px; font-weight: 500; font-size: 0.9rem; }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: var(--text-main); }
        .nav-item.active { background: var(--accent-gold); color: #000; }

        /* Main Content */
        .view { display: none; flex: 1; height: 100%; overflow-y: auto; padding: 40px; box-sizing: border-box; }
        .view.active { display: block; }
        h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 24px; }

        /* DASHBOARD SPECIFIC - NEW GRID */
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        
        .company-summary-card { 
            background: var(--card-bg); 
            border: 1px solid var(--border-color); 
            border-radius: 16px; 
            padding: 20px; 
            cursor: pointer; 
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .company-summary-card:hover { border-color: var(--accent-gold); transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .company-name { font-weight: 700; font-size: 1.1rem; color: var(--accent-gold); }
        .company-stats { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--text-dim); }
        
        /* Progress Bar for Dashboard Cards */
        .mini-progress-bg { height: 6px; background: var(--bg-dark); border-radius: 10px; overflow: hidden; display: flex; }
        .mini-progress-fill { height: 100%; }

        /* Project Focus - Vertical List */
        .focus-list { background: rgba(212, 160, 23, 0.05); border: 1px dashed var(--accent-gold); border-radius: 16px; padding: 20px; margin-bottom: 30px; }
        .focus-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; border-bottom: 1px solid var(--border-color); }
        .focus-item:last-child { border-bottom: none; }

        /* Input / Panel Styles */
        .input-panel { background: var(--sidebar-bg); padding: 25px; border-radius: 15px; border: 1px solid var(--accent-gold); margin-bottom: 30px; display: none; }
        .library-select { width: 100%; padding: 12px; margin-bottom: 15px; background: var(--bg-dark); color: var(--accent-gold); border: 1px solid var(--border-color); border-radius: 8px; font-weight: bold; }
        
        /* Unit Cards (Company View) */
        .unit-grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
        .unit-card { background: var(--card-bg); border-radius: 14px; padding: 16px; border: 1px solid var(--border-color); }
        .badge { font-size: 0.65rem; padding: 3px 8px; border-radius: 6px; font-weight: bold; text-transform: uppercase; margin-left: 8px; }
        .badge-hero { background: rgba(255, 159, 67, 0.1); color: var(--color-hero); }
        .badge-character { background: rgba(251, 99, 64, 0.1); color: var(--color-character); }
        .badge-battleline { background: rgba(45, 206, 137, 0.1); color: var(--color-battleline); }
        .badge-vehicle { background: rgba(137, 101, 224, 0.1); color: var(--color-vehicle); }

        /* Stats Widgets */
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
        .widget { background: var(--card-bg); padding: 20px; border-radius: 16px; border: 1px solid var(--border-color); }
        .widget-val { font-size: 1.5rem; font-weight: 800; display: block; }
        .widget-label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

        .btn-gold { background: var(--accent-gold); color: #000; border: none; padding: 12px 20px; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-gold:hover { opacity: 0.9; transform: scale(1.02); }
        
        input, select { background: var(--bg-dark); border: 1px solid var(--border-color); color: var(--text-main); padding: 10px; border-radius: 8px; }
        
        .comp-nav-item { padding: 10px; border-radius: 8px; cursor: pointer; color: var(--text-dim); margin-bottom: 4px; font-size: 0.85rem; }
        .comp-nav-item.active { background: rgba(255,255,255,0.05); color: var(--accent-gold); font-weight: 600; }

        .heatmap { display: flex; gap: 3px; height: 4px; margin: 12px 0; border-radius: 10px; overflow: hidden; background: var(--border-color); }
        .seg { flex: 1; height: 100%; }
        .seg.active { background: var(--accent-gold); }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">⚔️ WAR LEDGER</div>
        <div id="nav-dash" class="nav-item active" onclick="switchView('dashboard', this)">🏠 Dashboard</div>
        <div id="nav-muster" class="nav-item" onclick="switchView('muster', this)">📋 Unit Masterlist</div>
        <div id="nav-comp" class="nav-item" onclick="switchView('companies', this)">🛡️ My Detachments</div>
        
        <div style="margin-top: 30px; flex-grow: 1; overflow-y: auto;">
            <p style="font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; font-weight: 700; margin-bottom: 12px;">Fast Travel</p>
            <div id="comp-nav"></div>
            <button onclick="createNewCompany()" style="background:none; color:var(--text-dim); border:1px dashed var(--border-color); width:100%; padding:10px; border-radius:8px; cursor:pointer; margin-top:10px; font-size: 0.8rem;">+ New Company</button>
        </div>

        <div style="border-top: 1px solid var(--border-color); padding-top: 20px;">
            <button class="nav-item" style="width:100%; background:none; border:none;" onclick="exportData()">📤 Export Data</button>
            <button class="nav-item" style="width:100%; background:none; border:none;" onclick="importData()">📥 Import Data</button>
        </div>
    </div>

    <div id="dashboard" class="view active">
        <h1>Strategic Overview</h1>
        
        <div class="stat-grid" id="global-widgets"></div>

        <div id="project-focus-section" style="display:none;">
            <h2 style="font-size: 1.1rem; color: var(--accent-gold);">⭐ High Priority Painting</h2>
            <div id="project-list" class="focus-list"></div>
        </div>

        <h2 style="font-size: 1.1rem; margin-top: 40px;">📂 My Companies</h2>
        <div id="dash-gallery" class="dashboard-grid"></div>
    </div>

    <div id="muster" class="view">
        <h1>Unit Masterlist</h1>
        <input type="text" id="musterSearch" style="width: 100%; max-width: 400px; margin-bottom: 20px;" placeholder="Filter units..." onkeyup="renderMuster()">
        <div id="muster-container"></div>
    </div>

    <div id="companies" class="view">
        <div id="no-selection" style="text-align:center; margin-top:100px; color:var(--text-dim);">
            <h2>No Company Selected</h2>
            <p>Select a detachment from the sidebar to view units.</p>
        </div>
        
        <div id="active-ui" style="display:none;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 30px;">
                <h1 id="active-title" style="margin:0;">Company</h1>
                <button class="btn-gold" onclick="openPanel()">+ Add Unit</button>
            </div>

            <div id="unitPanel" class="input-panel">
                <p style="margin-top:0; font-weight:bold; color:var(--accent-gold);">Quick-Add from Library:</p>
                <select id="libraryDropdown" class="library-select" onchange="fillFromLibrary()">
                    <option value="">-- Select a Unit --</option>
                </select>
                <div style="display:grid; grid-template-columns: 2fr 1fr; gap: 10px;">
                    <input type="text" id="uName" placeholder="Unit Name">
                    <select id="uRole">
                        <option value="hero">Hero</option><option value="character">Character</option>
                        <option value="battleline">Battleline</option><option value="fire_support">Fire Support</option>
                        <option value="close_support">Close Support</option><option value="vehicle">Vehicle</option>
                    </select>
                </div>
                <div style="display:flex; gap: 10px; margin-top:10px;">
                    <input type="number" id="uModels" placeholder="Models" style="flex:1">
                    <input type="number" id="uPts" placeholder="Points" style="flex:1">
                    <input type="number" id="uCost" placeholder="Price $" style="flex:1">
                </div>
                <div style="margin-top:20px; display:flex; gap:10px;">
                    <button class="btn-gold" onclick="saveUnit()">Add to Company</button>
                    <button onclick="togglePanel(false)" style="background:none; color:var(--text-dim); border:none; cursor:pointer;">Cancel</button>
                </div>
            </div>

            <div id="unitContainer"></div>
        </div>
    </div>

    <script>
        const UNIT_LIBRARY = [
            { name: "Lion El’Jonson", role: "hero", models: 1, pts: 315, cost: 88 },
            { name: "Azrael", role: "hero", models: 1, pts: 125, cost: 57 },
            { name: "Deathwing Knights", role: "battleline", models: 5, pts: 250, cost: 85 },
            { name: "Deathwing Terminators", role: "battleline", models: 5, pts: 180, cost: 83 },
            { name: "Intercessors", role: "battleline", models: 10, pts: 160, cost: 78 },
            { name: "Hellblasters", role: "fire_support", models: 10, pts: 230, cost: 78 },
            { name: "Redemptor Dreadnought", role: "vehicle", models: 1, pts: 210, cost: 95 }
            // ... truncated for brevity, same list as before
        ];

        let army = JSON.parse(localStorage.getItem('warLedgerData')) || [
            { name: "First Company", units: [] }
        ];
        let activeIdx = null;

        window.onload = () => { 
            initLibrary();
            renderCompanyNav(); 
            updateDashboard(); 
        };

        function initLibrary() {
            const drop = document.getElementById('libraryDropdown');
            UNIT_LIBRARY.sort((a,b) => a.name.localeCompare(b.name)).forEach((u, i) => {
                const opt = document.createElement('option');
                opt.value = i;
                opt.innerText = `${u.name} (${u.pts}pts)`;
                drop.appendChild(opt);
            });
        }

        function fillFromLibrary() {
            const val = document.getElementById('libraryDropdown').value;
            if (val === "") return;
            const u = UNIT_LIBRARY[val];
            document.getElementById('uName').value = u.name;
            document.getElementById('uRole').value = u.role;
            document.getElementById('uModels').value = u.models;
            document.getElementById('uPts').value = u.pts;
            document.getElementById('uCost').value = u.cost;
        }

        function save() { 
            localStorage.setItem('warLedgerData', JSON.stringify(army)); 
            updateDashboard(); 
            renderCompanyNav();
            if(activeIdx !== null) renderUnits();
        }

        function switchView(id, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if (el) el.classList.add('active');
            if (id === 'dashboard') updateDashboard();
        }

        function updateDashboard() {
            const gal = document.getElementById('dash-gallery'); gal.innerHTML = '';
            const projList = document.getElementById('project-list'); projList.innerHTML = '';
            let global = { pts: 0, totalPts: 0, cost: 0, totalCost: 0, focused: 0 };

            army.forEach((comp, cIdx) => {
                let compPts = 0;
                let compPainted = 0;
                
                comp.units.forEach((u, uIdx) => {
                    global.totalPts += u.pts;
                    global.totalCost += u.cost;
                    if(u.painted) { global.pts += u.pts; compPainted += u.pts; }
                    if(u.owned) global.cost += u.cost;
                    compPts += u.pts;

                    if(u.focused) {
                        global.focused++;
                        projList.innerHTML += `
                            <div class="focus-item">
                                <div>
                                    <span style="font-weight:bold;">${u.name}</span>
                                    <span style="font-size:0.7rem; color:var(--text-dim); margin-left:10px;">${comp.name}</span>
                                </div>
                                <button onclick="toggleFocus(${cIdx}, ${uIdx})" style="background:none; border:none; cursor:pointer; color:var(--accent-gold);">DONE</button>
                            </div>
                        `;
                    }
                });

                const pct = compPts > 0 ? (compPainted / compPts) * 100 : 0;
                
                const card = document.createElement('div');
                card.className = 'company-summary-card';
                card.onclick = () => selectCompany(cIdx);
                card.innerHTML = `
                    <div class="company-name">${comp.name}</div>
                    <div class="company-stats">
                        <span>${comp.units.length} Units</span>
                        <span>${compPainted} / ${compPts} Pts Painted</span>
                    </div>
                    <div class="mini-progress-bg">
                        <div class="mini-progress-fill" style="width:${pct}%; background:var(--bar-painted)"></div>
                    </div>
                `;
                gal.appendChild(card);
            });

            document.getElementById('project-focus-section').style.display = global.focused > 0 ? 'block' : 'none';
            document.getElementById('global-widgets').innerHTML = `
                <div class="widget"><span class="widget-val">${global.pts}</span><span class="widget-label">Total Painted Pts</span></div>
                <div class="widget"><span class="widget-val">$${global.cost}</span><span class="widget-label">Collection Value</span></div>
            `;
        }

        function selectCompany(i) {
            activeIdx = i;
            switchView('companies', document.getElementById('nav-comp'));
            document.getElementById('no-selection').style.display = 'none';
            document.getElementById('active-ui').style.display = 'block';
            document.getElementById('active-title').innerText = army[i].name;
            renderUnits();
            renderCompanyNav();
        }

        function renderUnits() {
            const container = document.getElementById('unitContainer'); container.innerHTML = '';
            const units = army[activeIdx].units;
            
            units.forEach((u, uIdx) => {
                container.innerHTML += `
                    <div class="unit-card" style="margin-bottom:10px;">
                        <div style="display:flex; justify-content:space-between;">
                            <span style="font-weight:bold;">${u.name} <span class="badge badge-${u.role}">${u.role}</span></span>
                            <div>
                                <button onclick="toggleFocus(${activeIdx}, ${uIdx})" style="background:none; border:none; cursor:pointer; color:${u.focused ? 'var(--accent-gold)' : '#555'}">★</button>
                                <button onclick="deleteUnit(${uIdx})" style="background:none; border:none; cursor:pointer; color:#777">✕</button>
                            </div>
                        </div>
                        <div style="font-size:0.8rem; color:var(--text-dim); margin-top:5px;">${u.pts} Pts • ${u.models} Models</div>
                        <div style="display:flex; gap:10px; margin-top:10px;">
                            <label style="font-size:0.7rem;"><input type="checkbox" ${u.owned?'checked':''} onchange="toggleHobby(${uIdx}, 'owned')"> Owned</label>
                            <label style="font-size:0.7rem;"><input type="checkbox" ${u.painted?'checked':''} onchange="toggleHobby(${uIdx}, 'painted')"> Painted</label>
                        </div>
                    </div>
                `;
            });
        }

        function toggleFocus(cIdx, uIdx) { army[cIdx].units[uIdx].focused = !army[cIdx].units[uIdx].focused; save(); }
        function toggleHobby(uIdx, field) { army[activeIdx].units[uIdx][field] = !army[activeIdx].units[uIdx][field]; save(); }
        function deleteUnit(i) { army[activeIdx].units.splice(i, 1); save(); }
        
        function openPanel() { togglePanel(true); }
        function togglePanel(s) { document.getElementById('unitPanel').style.display = s ? 'block' : 'none'; }
        
        function saveUnit() {
            const u = {
                name: document.getElementById('uName').value,
                role: document.getElementById('uRole').value,
                models: parseInt(document.getElementById('uModels').value) || 0,
                pts: parseInt(document.getElementById('uPts').value) || 0,
                cost: parseInt(document.getElementById('uCost').value) || 0,
                owned: true, painted: false, focused: false
            };
            army[activeIdx].units.push(u);
            save();
            togglePanel(false);
        }

        function createNewCompany() {
            const n = prompt("Company Name:");
            if(n) { army.push({name: n, units: []}); save(); }
        }

        function renderCompanyNav() {
            const nav = document.getElementById('comp-nav'); nav.innerHTML = '';
            army.forEach((c, i) => {
                nav.innerHTML += `<div class="comp-nav-item ${activeIdx === i ? 'active' : ''}" onclick="selectCompany(${i})">▪ ${c.name}</div>`;
            });
        }

        function exportData() { navigator.clipboard.writeText(JSON.stringify(army)); alert("Data copied to clipboard."); }
        function importData() { const d = prompt("Paste your data here:"); if(d) { army = JSON.parse(d); save(); } }
    </script>
</body>
</html>
